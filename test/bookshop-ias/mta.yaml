_schema-version: 3.3.0
ID: bookshop-ias
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        # Workspace-aware install (bookshop-ias is a workspace member of ../..).
        - npm ci
        # Pack the local plugin into a tarball next to this mta.yaml. The
        # source package.json uses "file:../.." (resolves to cap-mcp root from
        # bookshop-ias/); that literal path does NOT survive `cds build` —
        # gen/srv/package.json would carry the same string but ../.. from
        # gen/srv/ points to bookshop-ias/ (wrong package). A tarball reference
        # survives the copy because it's relative to its own dir.
        - npm pack ../.. --silent --pack-destination .
        - npx cds build --production
        # Move the tarball into gen/srv (stable name), rewrite gen/srv/package.json
        # to reference it, and generate a lockfile so `builder: npm-ci` can
        # install deterministically. Using a small script for cross-platform
        # file ops — mbt exec's commands directly (no shell globbing).
        - node -e "const fs=require('fs'),path=require('path');const src=fs.readdirSync('.').find(f=>/^gavdi-cap-mcp-.*\\.tgz$/.test(f));if(!src)throw new Error('no tgz');fs.copyFileSync(src,'gen/srv/cap-mcp.tgz');fs.unlinkSync(src);const p='gen/srv/package.json',j=JSON.parse(fs.readFileSync(p));j.dependencies['@gavdi/cap-mcp']='file:./cap-mcp.tgz';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\\n');"
        - npm install --prefix gen/srv --package-lock-only --omit=dev --ignore-scripts
modules:
  - name: bookshop-ias-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
      routes:
        - route: "${default-url}"
        - route: "${default-host}.cert.${default-domain}"
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
          srv-cert-url: '${protocol}://${default-host}.cert.${default-domain}'
    requires:
      - name: bookshop-ias-auth
        parameters:
          config:
            credential-type: X509_GENERATED
            app-identifier: srv
      - name: bookshop-ias-db

  - name: bookshop-ias
    type: approuter.nodejs
    path: app/router
    requires:
      - name: bookshop-ias-auth
        parameters:
          config:
            credential-type: X509_GENERATED
            app-identifier: approuter
      - name: srv-api
        group: destinations
        properties:
          url: ~{srv-cert-url}
          forwardAuthCertificates: true
          forwardAuthToken: true
          strictSSL: true
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

  - name: bookshop-ias-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: bookshop-ias-db

resources:
  - name: bookshop-ias-auth
    type: org.cloudfoundry.managed-service
    requires:
      - name: app-api
    parameters:
      service: identity
      service-name: bookshop-ias-auth
      service-plan: application
      config:
        provided-apis:
          - name: bookshop-ias-auth-api
            description: API exposed by the application
        display-name: Bookshop MCP (${org}-${space})
        oauth2-configuration:
          token-policy:
            access-token-format: "jwt"
          redirect-uris:
            - http://localhost:5000/login/callback?authType=ias
            - ~{app-api/app-protocol}://*~{app-api/app-uri}/login/callback
          post-logout-redirect-uris:
            - ~{app-api/app-protocol}://*~{app-api/app-uri}/*/logout.html
        xsuaa-cross-consumption: true
  - name: bookshop-ias-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
